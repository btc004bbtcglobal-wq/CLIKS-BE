name: 🚀 Deploy CLIKS Backend

on:
  push:
    branches:
      - main   # change if using another branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via rsync
        uses: burnett01/rsync-deployments@v7
        with:
          switches: -avz --delete --exclude 'node_modules' --exclude '.git' --exclude '.env'
          path: ./
          remote_path: /var/www/CLIKS-BE/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: ⚙️ Install deps + reload PM2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/CLIKS-BE
            npm install --omit=dev
            pm2 reload cliks-be

      - name: 📊 Show logs (last 50 lines)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            pm2 logs cliks-be --lines 50